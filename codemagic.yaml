app_id: com.claw.control

environment:
  group_vars:
    - id: DEVELOPMENT_TEAM
      value: ""  # ⚠️ 填入你的 Apple Team ID（Personal Team 也有）
  node: 22

workflows:
  ios-build:
    name: Build iOS (ClawControl)
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      # 1. 安装 npm 依赖
      - name: Install dependencies
        script: |
          npm ci

      # 2. 构建 Web 应用
      - name: Build web app
        script: |
          npm run mobile:build

      # 3. 添加 iOS 平台（Capacitor 8+ 默认 SPM，需显式指定 CocoaPods）
      - name: Add iOS platform
        script: |
          npx cap add ios --packagemanager CocoaPods

      # 4. 同步 Web 产物到 iOS 原生项目
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      # 5. 安装 CocoaPods 依赖
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install && cd ../..

      # 6. 生成 iOS 图标和启动屏资源
      - name: Generate iOS assets
        script: |
          npx @capacitor/assets generate --ios --splashBackgroundColor "#06080a" --iconBackgroundColor "#06080a"

      # 7. 修复 iOS 启动屏样式
      - name: Fix iOS splash
        script: |
          if [ -f "scripts/fix-ios-splash.js" ]; then node scripts/fix-ios-splash.js; fi

      # 8. 创建 ExportOptions.plist（无签名 ad-hoc 导出）
      - name: Create ExportOptions.plist
        script: |
          mkdir -p ios
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      # 9. 构建 iOS 项目并导出 IPA
      - name: Build and export IPA
        script: |
          set -e  # 任何命令失败立即停止

          cd ios/App

          # 确认当前目录和 scheme 名称
          echo "=== PWD: $(pwd) ==="
          xcodebuild -workspace App.xcworkspace -list

          # 构建 archive（使用 -verbose 查看详细过程）
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$(pwd)/App.xcarchive" \
            -verbose \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 验证 archive 文件确实存在
          ARCHIVE_PATH="$(pwd)/App.xcarchive"
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "ERROR: Archive not created at $ARCHIVE_PATH"
            ls -la "$(pwd)/"
            exit 1
          fi
          echo "=== Archive found: $ARCHIVE_PATH ==="

          # 导出 IPA（无签名模式）
          mkdir -p ../build
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath ../build \
            -exportOptionsPlist ../ExportOptions.plist

    artifacts:
      - build/App.ipa
      - build/App.xcarchive
