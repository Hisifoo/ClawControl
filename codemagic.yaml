app_id: com.claw.control

environment:
  group_vars:
    - id: DEVELOPMENT_TEAM
      value: ""  # ⚠️ 填入你的 Apple Team ID（Personal Team 也有）
  node: 22

workflows:
  ios-build:
    name: Build iOS (ClawControl)
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      # 1. 安装 npm 依赖
      - name: Install dependencies
        script: |
          npm ci

      # 2. 构建 Web 应用
      - name: Build web app
        script: |
          npm run mobile:build

      # 3. 添加 iOS 平台（Capacitor 8+ 默认 SPM，需显式指定 CocoaPods）
      - name: Add iOS platform
        script: |
          npx cap add ios --packagemanager CocoaPods

      # 4. 同步 Web 产物到 iOS 原生项目
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      # 5. 安装 CocoaPods 依赖
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install && cd ../..

      # 6. 生成 iOS 图标和启动屏资源
      - name: Generate iOS assets
        script: |
          npx @capacitor/assets generate --ios --splashBackgroundColor "#06080a" --iconBackgroundColor "#06080a"

      # 7. 修复 iOS 启动屏样式
      - name: Fix iOS splash
        script: |
          if [ -f "scripts/fix-ios-splash.js" ]; then node scripts/fix-ios-splash.js; fi

      # 8. 创建 ExportOptions.plist（无签名 ad-hoc 导出）
      - name: Create ExportOptions.plist
        script: |
          mkdir -p ios
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      # 9. 构建 iOS 并打包 IPA
      # 注意：xcodebuild archive 在 CODE_SIGNING_ALLOWED=NO 下会静默跳过 archive 输出（Xcode 26 行为）
      # 因此改用 xcodebuild build 生成 .app，再手动打包为 IPA
      - name: Build and package IPA
        script: |
          set -e

          cd ios/App
          mkdir -p ../build

          # 确认目录和 scheme
          echo "=== Working directory: $(pwd) ==="
          echo "=== Available schemes ==="
          xcodebuild -workspace App.xcworkspace -list

          # 使用 xcodebuild build 生成 .app（而非 archive，静默失败问题）
          echo "=== Building .app bundle ==="
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 找到生成的 .app（位于 DerivedData/Build/Products/Release-iphoneos/）
          # 由于 DerivedData 路径固定，可以直接构建路径
          APP_DIR="$HOME/Library/Developer/Xcode/DerivedData/App-dfqlwfgrvlmjunbkfzimjqcghcbo/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: App.app not found at $APP_DIR"
            # 尝试自动查找
            FOUND=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found App.app at: $FOUND"
              APP_DIR="$FOUND"
            else
              echo "=== Searching for App.app ==="
              find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | grep -i App || true
              exit 1
            fi
          fi

          echo "=== App.app found: $APP_DIR ==="
          ls -la "$APP_DIR"

          # 打包为 IPA（标准 Payload 目录结构）
          echo "=== Packaging IPA ==="
          cd ../build
          mkdir -p Payload
          cp -R "$APP_DIR" Payload/App.app
          zip -r -q App.ipa Payload
          rm -rf Payload

          echo "=== IPA created ==="
          ls -la App.ipa

    artifacts:
      - build/App.ipa
